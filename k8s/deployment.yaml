---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: espn-soccer
  namespace: n8n
  labels:
    app: espn-soccer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: espn-soccer
  template:
    metadata:
      labels:
        app: espn-soccer
    spec:
      containers:
      - name: espn-soccer
        image: image-registry.openshift-image-registry.svc:5000/n8n/espn-soccer:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: NODE_ENV
          value: production
        - name: TZ
          value: UTC
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
